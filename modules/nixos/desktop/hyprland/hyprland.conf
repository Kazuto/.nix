debug {
  disable_logs = false
}

# === Monitors === #
monitor=DP-1,3440x1440@100.00Hz,0x0,1
monitor=DP-2,1920x1080@165,3440x0,1

# === Status Bar, OSD, Wallpaper === #
exec-once = $HOME/.config/waybar/waybar.sh
exec-once = wl-clipboard-history -t

exec-once = avizo-service
exec-once = hyprpaper

exec-once = ~/.config/hypr/xdg-portal-hyprland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland DBUS_SESSION_BUS_ADDRESS
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = $POLKIT_AUTH_AGENT
# exec-once = $HOME/.local/share/hyprload/hyprload.sh

exec-once = [workspace 1 silent] firefox -no-remote -P "Smake"
exec-once = [workspace 2 silent] ghostty
exec-once = [workspace 5 silent] firefox -no-remote -P "Personal"
exec-once = [workspace 6 silent] teams

# === Keyboard === #
input {
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

device {
  name = logitech-mx-keys-mac
  kb_layout = de,de
  kb_variant = mac,nodeadkeys
  kb_options = caps:escape
}

# === Layout === #
general {
  layout = master

  gaps_in=5
  gaps_out=20
  border_size=2

  col.active_border=0xff89b4fa
  col.inactive_border=0x00313244
}

# === Misc === #
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
}

# === Decorations === #
decoration {
  rounding = 8

  active_opacity = 1.0
  inactive_opacity = 1.0
}

decoration:blur {
  enabled = true
  size = 3
  passes = 3
}

decoration:shadow {
  enabled = true
  ignore_window = true
  offset = 2 2
  range = 4
  render_power = 2
  color = 0x66000000
}

layerrule = match:namespace gtk-layer-shell, blur on
# layerrule = match:namespace waybar, blur on
layerrule = match:namespace lockscreen, blur on

# === Animations === #
animations {
  enabled = true

  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = workspaces, 1, 6, default

}

# === Layouts === #
dwindle {
  pseudotile = true
  preserve_split = true
}

# === Window rules === #
windowrule = match:class file_progress, float on
windowrule = match:class confirm, float on
windowrule = match:class dialog, float on
windowrule = match:class download, float on
windowrule = match:class notification, float on
windowrule = match:class error, float on
windowrule = match:class splash, float on
windowrule = match:class confirmreset, float on
windowrule = match:title Open File, float on
windowrule = match:title branchdialog, float on
windowrule = match:class Lxappearance, float on
windowrule = match:class Rofi, float on, no_anim on
windowrule = match:class viewnior, float on
windowrule = match:class feh, float on
windowrule = match:class pavucontrol-qt, float on
windowrule = match:class pavucontrol, float on
windowrule = match:class file-roller, float on
windowrule = match:class wlogout, fullscreen on
windowrule = match:title wlogout, float on, fullscreen on
windowrule = match:class mpv, idle_inhibit focus
windowrule = match:class firefox, idle_inhibit fullscreen
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(Volume Control)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Volume Control)$, size 800 600, move 75 44%
windowrule = match:float border_size 0

# === Keybinds === #
bind = SUPER, F1, exec, ~/.config/hypr/keybind
bind = SUPER, B, exec, firefox -no-remote -P "Personal"
bind = SUPER, S, exec, firefox -no-remote -P "Smake"
bind = SUPER, T, exec, teams
bind = SUPER, P, exec, wlogout
bind = SUPER, Return, exec, ghostty
bind = SUPER, E, exec, thunar

# === Audio === #
binde=, XF86AudioRaiseVolume, exec, volumectl -u up
binde=, XF86AudioLowerVolume, exec, exec  volumectl -u down
bindl=, XF86AudioMute, exec, volumectl toggle-mute

# binde=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# binde=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=, XF86AudioPlay, exec, playerctl play-pause
bind=, XF86AudioPause, exec, playerctl play-pause
bind=, XF86AudioNext, exec, playerctl next
bind=, XF86AudioPrev, exec, playerctl previous

# === Screenshots === #
$activeMonitor = hyprctl monitors -j | jq -r '.[] | select(.focused) | .name'
$activeWindow = hyprctl activewindow -j | jq -j '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"'
$fileName = $(date +'%Y%m%d%H%M%S_1.png')

$animateIn = hyprctl keyword animation "fadeOut,0,0,default"
$animateOut = hyprctl keyword animation "fadeOut,1,4,default"

bind = SUPER CTRL, 3, exec, grim -o DP-1
bind = SUPPER CTRL SHIFT, 3, exec, grim -o $activeMonitor - | wl-copy && notify-send "Screenshot" "Saved to clipboard"

bind = SUPER CTRL, 4, exec, grim -g $activeWindow $fileName && notify-send "Screenshot" "Saved to $fileName"
bind = SUPER CTRL SHIFT, 4, exec, grim -g $activeWindow - | wl-copy && notify-send "Screenshot" "Saved to clipboard"

# === Other === #
bind = SUPER SHIFT, X, exec, hyprpicker -a -n
bind = CTRL ALT, L, exec, swaylock

bind = SUPER, R, exec, killall rofi || rofi -show drun -theme ~/.config/rofi/themes/drun.rasi
bind = SUPER, Tab, exec, killall rofi || rofi -show window -modi window -theme ~/.config/rofi/themes/windows.rasi
bind = SUPER, period, exec, killall rofi || rofi -show emoji -modi emoji -format "{emoji}" -theme ~/.config/rofi/themes/emoji.rasi
bind = SUPER, escape, exec, wlogout --protocol layer-shell -b 5 -T 400 -B 400

bind = SUPER, Q, killactive,
bind = SUPER SHIFT, Q, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, Space, togglefloating,
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, S, togglesplit, # dwindle

# bind=,Print,exec,grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%Y%m%d%H%M%S_1.png') && notify-send 'Screenshot Saved'
# bind=SUPER,Print,exec,grim - | wl-copy && notify-send 'Screenshot Copied to Clipboard'
# bind=SUPERSHIFT,Print,exec,grim - | swappy -f -
# bind=SUPERSHIFT,S,exec,slurp | grim -g - $(xdg-user-dir PICTURES)/Screenshots/$(date +'%Y%m%d%H%M%S_1.png') && notify-send 'Screenshot Saved'

# === Focus === #
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# === Move Windows === #
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# === Resize Windows === #
bind = SUPER CTRL, left, resizeactive, -20 0
bind = SUPER CTRL, right, resizeactive, 20 0
bind = SUPER CTRL, up, resizeactive, 0 -20
bind = SUPER CTRL, down, resizeactive, 0 20

# === Window Groups === #
bind= SUPER, g, togglegroup
bind= SUPER, tab, changegroupactive

# === Workspaces === #
bind = SUPER, grave, togglespecialworkspace
bind = SUPER SHIFT, grave, movetoworkspace, special

# === Workspace Binds === #
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER ALT, up, workspace, e+1
bind = SUPER ALT, down, workspace, e-1

# === Move to Workspace === #
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# === Mouse Binds === #
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# === Plugins === #
exec-once = hyprctl plugin load "$HYPR_PLUGIN_DIR/lib/split-monitor-workspaces.so"
